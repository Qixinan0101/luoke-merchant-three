<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>洛克远行商人</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #f0c040; --gold-dark: #c8960a; --bg-dark: #1a1a2e;
  --bg-card: #222244; --bg-card2: #2a2a55; --text: #f0e6d3;
  --text-dim: #a09080; --green: #4caf50; --red: #ef5350;
  --blue: #42a5f5; --orange: #ffa726; --pink: #e040fb; --cyan: #00e5ff;
}
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg-dark); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.header { background: linear-gradient(135deg, #1a1a3e 0%, #2a1a4e 100%); padding: 14px 20px 10px; text-align: center; border-bottom: 2px solid var(--gold-dark); position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 20px; color: var(--gold); letter-spacing: 2px; }
.header .subtitle { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.nav-tabs { display: flex; background: rgba(0,0,0,0.3); overflow-x: auto; -webkit-overflow-scrolling: touch; }
.nav-tab { flex-shrink: 0; padding: 10px 10px; text-align: center; font-size: 12px; font-weight: 600; color: var(--text-dim); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
.nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.page { display: none; }
.page.active { display: block; }

/* Common */
.status-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; font-size: 13px; background: rgba(0,0,0,0.3); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
.status-dot.closed { background: var(--red); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.countdown-section { padding: 16px 20px; text-align: center; }
.countdown-label { font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
.countdown-timer { font-size: 36px; font-weight: bold; color: var(--gold); letter-spacing: 2px; }
.countdown-timer.closed { font-size: 18px; color: var(--text-dim); }
.next-refresh { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
.round-tabs { display: flex; gap: 8px; padding: 0 20px 12px; overflow-x: auto; }
.round-tab { flex-shrink: 0; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; border: 2px solid transparent; background: var(--bg-card); color: var(--text-dim); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.round-tab.active { border-color: var(--gold); color: var(--gold); background: var(--bg-card2); }
.round-tab .tab-time { font-size: 11px; opacity: 0.7; }
.items-section { padding: 0 16px 100px; }
.round-title { font-size: 15px; color: var(--gold); margin: 16px 4px 10px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.round-title .time { font-size: 12px; color: var(--text-dim); font-weight: normal; }
.item-card { background: var(--bg-card); border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; border: 1px solid rgba(240,192,64,0.1); }
.item-img { width: 56px; height: 56px; border-radius: 8px; background: var(--bg-card2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; overflow: hidden; }
.item-img img { width: 100%; height: 100%; object-fit: contain; }
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.item-category { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
.item-meta { display: flex; gap: 12px; flex-wrap: wrap; }
.item-meta span { font-size: 12px; padding: 2px 8px; border-radius: 4px; background: var(--bg-card2); }
.meta-price { color: var(--gold) !important; }
.meta-limit { color: var(--orange) !important; }
.meta-api-src { color: var(--cyan) !important; font-size: 10px !important; }
.no-items { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 14px; }
.refresh-fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border: none; color: #1a1a2e; font-size: 24px; cursor: pointer; box-shadow: 0 4px 16px rgba(240,192,64,0.4); display: flex; align-items: center; justify-content: center; z-index: 200; transition: transform 0.2s; }
.refresh-fab:active { transform: scale(0.9); }
.refresh-fab.spinning svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.loading-spinner { width: 32px; height: 32px; border: 3px solid var(--bg-card2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
.closed-overlay { text-align: center; padding: 40px 20px; }
.closed-icon { font-size: 48px; margin-bottom: 12px; }
.closed-text { font-size: 16px; color: var(--text-dim); line-height: 1.6; }

/* EGG */
.egg-search-box { padding: 20px 20px 16px; }
.egg-search-box .hint { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; text-align: center; line-height: 1.5; }
.egg-input-group { display: flex; gap: 12px; margin-bottom: 12px; }
.egg-input-wrap { flex: 1; position: relative; }
.egg-input-wrap label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; }
.egg-input-wrap input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 2px solid rgba(240,192,64,0.2); background: var(--bg-card); color: var(--text); font-size: 18px; font-weight: 600; font-family: inherit; outline: none; -webkit-appearance: none; }
.egg-input-wrap input:focus { border-color: var(--gold); }
.egg-input-wrap .unit { position: absolute; right: 14px; bottom: 14px; font-size: 12px; color: var(--text-dim); }
.btn-primary { width: 100%; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #1a1a2e; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-primary:active { transform: scale(0.97); }
.btn-sm { width: auto !important; padding: 8px 16px !important; font-size: 12px !important; margin-top: 8px; background: linear-gradient(135deg, #42a5f5, #1e88e5) !important; color: #fff !important; }
.egg-quick-select { padding: 0 20px 8px; display: flex; flex-wrap: wrap; gap: 8px; }
.egg-chip { padding: 6px 14px; border-radius: 16px; background: var(--bg-card); color: var(--text-dim); font-size: 12px; cursor: pointer; border: 1px solid rgba(240,192,64,0.15); white-space: nowrap; -webkit-tap-highlight-color: transparent; }
.egg-chip:active { background: var(--bg-card2); color: var(--gold); border-color: var(--gold); }
.egg-chip.test-chip { border-color: rgba(66,165,245,0.3); color: var(--blue); }
.egg-results { padding: 0 16px 100px; }
.egg-result-header { font-size: 14px; color: var(--text-dim); margin-bottom: 12px; padding-left: 4px; }
.egg-result-header strong { color: var(--gold); }
.egg-test-blocks { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; padding: 0 20px 12px; }
.egg-test-block { background: var(--bg-card); border-radius: 10px; padding: 10px 12px; cursor: pointer; border: 1px solid rgba(66,165,245,0.15); transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
.egg-test-block:active { border-color: var(--blue); background: var(--bg-card2); }
.egg-test-block .tb-name { font-size: 13px; font-weight: 600; color: var(--text); }
.egg-test-block .tb-data { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.egg-test-block .tb-expect { font-size: 10px; color: var(--orange); margin-top: 2px; }
.egg-result-card { background: var(--bg-card); border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid rgba(240,192,64,0.1); }
.egg-result-card.best-match { border-color: rgba(240,192,64,0.4); box-shadow: 0 0 20px rgba(240,192,64,0.08); }
.egg-result-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.egg-result-icon { width: 48px; height: 48px; border-radius: 50%; background: var(--bg-card2); display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; overflow: hidden; }
.egg-result-icon img { width: 100%; height: 100%; object-fit: contain; }
.egg-result-info { flex: 1; min-width: 0; }
.egg-result-name { font-size: 16px; font-weight: 700; color: var(--text); }
.egg-result-attr { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.egg-match-bar-wrap { height: 6px; background: var(--bg-card2); border-radius: 3px; overflow: hidden; margin-top: 8px; }
.egg-match-bar { height: 100%; border-radius: 3px; }
.egg-match-percent { font-size: 13px; font-weight: 700; text-align: right; margin-top: 2px; }
.egg-match-detail { font-size: 11px; color: var(--text-dim); margin-top: 4px; line-height: 1.5; }
.egg-no-result { text-align: center; padding: 40px 20px; color: var(--text-dim); }
.egg-no-result .icon { font-size: 48px; margin-bottom: 12px; }
.egg-test-verdict { border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; }
.egg-test-verdict.pass { background: rgba(76,175,80,0.15); color: var(--green); border: 1px solid rgba(76,175,80,0.3); }
.egg-test-verdict.fail { background: rgba(239,83,80,0.15); color: var(--red); border: 1px solid rgba(239,83,80,0.3); }

/* POKEDEX */
.pokedex-search { padding: 16px 16px 8px; }
.pokedex-search input { width: 100%; padding: 12px 16px; border-radius: 24px; border: 2px solid rgba(240,192,64,0.2); background: var(--bg-card); color: var(--text); font-size: 15px; font-family: inherit; outline: none; -webkit-appearance: none; }
.pokedex-search input:focus { border-color: var(--gold); }
.pokedex-filters { padding: 8px 16px; display: flex; flex-wrap: wrap; gap: 6px; }
.filter-chip { padding: 5px 12px; border-radius: 14px; font-size: 12px; background: var(--bg-card); color: var(--text-dim); cursor: pointer; border: 1px solid rgba(240,192,64,0.1); -webkit-tap-highlight-color: transparent; }
.filter-chip.active { background: var(--bg-card2); color: var(--gold); border-color: var(--gold); }
.pokedex-grid { padding: 0 12px 100px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.pokedex-card { background: var(--bg-card); border-radius: 12px; padding: 10px; text-align: center; border: 1px solid rgba(240,192,64,0.08); cursor: pointer; transition: border-color 0.15s; -webkit-tap-highlight-color: transparent; }
.pokedex-card:active { border-color: var(--gold-dark); }
.pokedex-card .pk-img { width: 60px; height: 60px; margin: 0 auto 6px; border-radius: 8px; background: var(--bg-card2); display: flex; align-items: center; justify-content: center; font-size: 30px; overflow: hidden; }
.pokedex-card .pk-img img { width: 100%; height: 100%; object-fit: contain; }
.pokedex-card .pk-num { font-size: 10px; color: var(--text-dim); }
.pokedex-card .pk-name { font-size: 13px; font-weight: 600; color: var(--text); margin-top: 2px; }
.pokedex-card .pk-attr { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
.pokedex-detail-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 300; align-items: center; justify-content: center; }
.pokedex-detail-overlay.show { display: flex; }
.pokedex-detail-card { background: var(--bg-card); border-radius: 16px; padding: 20px; width: 90%; max-width: 360px; max-height: 80vh; overflow-y: auto; text-align: center; border: 2px solid var(--gold-dark); }
.pokedex-detail-card .detail-img { width: 120px; height: 120px; margin: 0 auto 12px; border-radius: 12px; background: var(--bg-card2); display: flex; align-items: center; justify-content: center; font-size: 60px; overflow: hidden; }
.pokedex-detail-card .detail-img img { width: 100%; height: 100%; object-fit: contain; }
.pokedex-detail-card .detail-name { font-size: 22px; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
.pokedex-detail-card .detail-num { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
.pokedex-detail-card .detail-attr { display: inline-block; padding: 4px 14px; border-radius: 12px; font-size: 13px; font-weight: 600; margin-bottom: 12px; }
.pokedex-detail-card .detail-info { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
.pokedex-detail-card .detail-close { margin-top: 16px; padding: 10px 30px; border-radius: 20px; background: var(--bg-card2); color: var(--text); border: none; font-size: 14px; cursor: pointer; font-family: inherit; }
.pokedex-count { padding: 4px 16px; font-size: 12px; color: var(--text-dim); text-align: center; }

/* SHINY — Custom Tracker */
.shiny-section { padding: 16px 16px 120px; }
.shiny-intro { background: var(--bg-card); border-radius: 12px; padding: 14px; margin-bottom: 16px; font-size: 13px; line-height: 1.6; color: var(--text-dim); }
.shiny-intro strong { color: var(--gold); }
.shiny-top-bar { display: flex; gap: 10px; margin-bottom: 16px; position: relative; }
.shiny-top-bar input { flex: 1; padding: 12px 16px; border-radius: 24px; border: 2px solid rgba(240,192,64,0.2); background: var(--bg-card); color: var(--text); font-size: 15px; font-family: inherit; outline: none; -webkit-appearance: none; }
.shiny-top-bar input:focus { border-color: var(--gold); }
.shiny-dropdown-wrap { display: none; position: absolute; left: 0; right: 0; top: 50px; background: var(--bg-card2); border: 2px solid var(--gold-dark); border-radius: 12px; max-height: 280px; overflow-y: auto; z-index: 50; }
.shiny-dropdown-wrap.show { display: block; }
.shiny-dropdown-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; border-bottom: 1px solid rgba(240,192,64,0.08); -webkit-tap-highlight-color: transparent; }
.shiny-dropdown-item:active { background: rgba(240,192,64,0.1); }
.shiny-dropdown-item .dd-img { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-size: 22px; overflow: hidden; flex-shrink: 0; }
.shiny-dropdown-item .dd-img img { width: 100%; height: 100%; object-fit: contain; }
.shiny-dropdown-item .dd-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
.shiny-dropdown-item .dd-attr { font-size: 11px; color: var(--text-dim); }
.shiny-catch-section { text-align: center; margin: 16px 0; }
.btn-shiny-catch { display: inline-block; padding: 16px 36px; border-radius: 28px; border: none; font-size: 18px; font-weight: 700; cursor: pointer; font-family: inherit; margin: 4px; -webkit-tap-highlight-color: transparent; transition: transform 0.15s; }
.btn-shiny-catch:active { transform: scale(0.95); }
.btn-shiny-catch.normal { background: linear-gradient(135deg, #43a047, #2e7d32); color: #fff; }
.btn-shiny-catch.shiny { background: linear-gradient(135deg, #fdd835, #f9a825); color: #1a1a2e; animation: shimmer 2s infinite; }
@keyframes shimmer { 0%,100%{box-shadow: 0 0 8px rgba(253,216,53,0.4)} 50%{box-shadow: 0 0 24px rgba(253,216,53,0.8)} }
.shiny-pet-card { background: var(--bg-card); border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 1px solid rgba(240,192,64,0.1); }
.shiny-pet-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.shiny-pet-header .pet-img { width: 44px; height: 44px; border-radius: 50%; background: var(--bg-card2); display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; flex-shrink: 0; }
.shiny-pet-header .pet-img img { width: 100%; height: 100%; object-fit: contain; }
.shiny-pet-header .pet-info { flex: 1; min-width: 0; }
.shiny-pet-header .pet-name { font-size: 15px; font-weight: 700; color: var(--text); }
.shiny-pet-header .pet-sub { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
.shiny-pet-header .pet-count { font-size: 24px; font-weight: 700; color: var(--gold); flex-shrink: 0; text-align: right; min-width: 40px; }
.shiny-pet-bar-wrap { height: 8px; background: var(--bg-card2); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
.shiny-pet-bar { height: 100%; border-radius: 4px; background: var(--gold); transition: width 0.3s; }
.shiny-pet-actions { display: flex; gap: 8px; }
.pet-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
.pet-btn.catch-normal { background: rgba(76,175,80,0.3); color: var(--green); }
.pet-btn.catch-shiny { background: linear-gradient(135deg, #fdd835, #f9a825); color: #1a1a2e; }
.pet-btn.reset { background: rgba(255,167,38,0.2); color: var(--orange); flex: 0.5; }
.pet-btn.delete { background: rgba(239,83,80,0.2); color: var(--red); flex: 0.5; }
.shiny-pet-log { font-size: 11px; color: var(--orange); margin-top: 8px; padding: 6px 10px; background: rgba(255,167,38,0.1); border-radius: 6px; }
.shiny-section-title { font-size: 14px; font-weight: 700; color: var(--gold); margin: 16px 0 10px; }
.shiny-empty { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 14px; line-height: 1.6; }
.shiny-history-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid rgba(240,192,64,0.06); font-size: 12px; }
.shiny-history-item .hist-icon { font-size: 16px; }
.shiny-history-item .hist-name { color: var(--gold); font-weight: 600; flex: 1; }
.shiny-history-item .hist-date { color: var(--text-dim); }
.shiny-history-item .hist-at { color: var(--text-dim); font-size: 11px; }

/* SHINY CATALOG — Season accordion */
.shiny-catalog { margin-bottom: 10px; }
.season-section { background: var(--bg-card); border-radius: 12px; margin-bottom: 10px; overflow: hidden; border: 1px solid rgba(240,192,64,0.1); }
.season-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
.season-header .season-icon { font-size: 22px; flex-shrink: 0; }
.season-header .season-info { flex: 1; min-width: 0; }
.season-header .season-title { font-size: 14px; font-weight: 700; color: var(--gold); }
.season-header .season-sub { font-size: 11px; color: var(--text-dim); }
.season-header .season-arrow { font-size: 14px; color: var(--text-dim); transition: transform 0.3s; flex-shrink: 0; }
.season-header.open .season-arrow { transform: rotate(180deg); }
.season-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
.season-body.open { max-height: 2000px; }
.shiny-catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; padding: 0 12px 12px; }
.shiny-catalog-item { background: var(--bg-card2); border-radius: 10px; padding: 10px 8px; display: flex; flex-direction: column; align-items: center; gap: 4px; border: 1px solid rgba(240,192,64,0.06); position: relative; }
.shiny-catalog-item.tracking { border-color: var(--gold); border-width: 2px; }
.shiny-catalog-item .ci-img { width: 44px; height: 44px; border-radius: 50%; background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-size: 24px; overflow: hidden; }
.shiny-catalog-item .ci-img img { width: 100%; height: 100%; object-fit: contain; }
.shiny-catalog-item .ci-name { font-size: 12px; font-weight: 600; color: var(--text); text-align: center; line-height: 1.2; }
.shiny-catalog-item .ci-num { font-size: 10px; color: var(--text-dim); }
.shiny-catalog-item .ci-btn { width: 100%; padding: 5px 0; border-radius: 6px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; text-align: center; }
.shiny-catalog-item .ci-btn.add { background: rgba(76,175,80,0.25); color: var(--green); }
.shiny-catalog-item .ci-btn.tracked { background: rgba(240,192,64,0.2); color: var(--gold); }
.shiny-catalog-item .ci-badge { position: absolute; top: 4px; right: 4px; font-size: 9px; background: var(--gold); color: #1a1a2e; border-radius: 5px; padding: 1px 5px; font-weight: 700; }
.shiny-catalog-item .ci-evo { font-size: 9px; color: var(--text-dim); text-align: center; line-height: 1.3; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Evolution chain in tracked pet card */
.pet-evo-chain { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 8px 0; margin-bottom: 8px; flex-wrap: wrap; }
.evo-step { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.evo-img { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-card2); display: flex; align-items: center; justify-content: center; font-size: 16px; overflow: hidden; border: 2px solid var(--gold-dark); }
.evo-img img { width: 100%; height: 100%; object-fit: contain; }

/* Placeholder for sprites without Wiki images (replaces emoji) */
.sprite-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #fff;
  border-radius: 50%; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  letter-spacing: -1px;
}
.evo-name { font-size: 10px; color: var(--gold); font-weight: 600; }
.evo-num { font-size: 9px; color: var(--text-dim); }
.evo-arrow { font-size: 16px; color: var(--gold); margin: 0 2px; flex-shrink: 0; }

/* EVENTS */
.events-section { padding: 16px 16px 100px; }
.event-card { background: var(--bg-card); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(240,192,64,0.1); }
.event-card .event-title { font-size: 16px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
.event-card .event-date { font-size: 12px; color: var(--orange); margin-bottom: 8px; }
.event-card .event-desc { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
.event-card .event-tag { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; background: var(--bg-card2); margin: 4px 4px 0 0; }
.event-card .event-tag.active-tag { background: rgba(76,175,80,0.3); color: var(--green); }
.event-card .event-tag.new-tag { background: rgba(224,64,251,0.3); color: var(--pink); }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(240,192,64,0.3); border-radius: 2px; }
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--bg-card2); color: var(--gold); padding: 10px 24px; border-radius: 20px; font-size: 14px; z-index: 400; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }
</style>
</head>

<div class="header">
  <h1>🏰 洛克王国世界</h1>
  <div class="subtitle" id="headerSubtitle">远行商人 · 实时商品</div>
</div>

<div class="nav-tabs" id="navTabs">
  <div class="nav-tab active" data-page="merchant">🏪 商人</div>
  <div class="nav-tab" data-page="egg">🥚 蛋查询</div>
  <div class="nav-tab" data-page="pokedex">📖 图鉴</div>
  <div class="nav-tab" data-page="shiny">✨ 异色</div>
  <div class="nav-tab" data-page="events">📢 活动</div>
</div>

<!-- MERCHANT PAGE -->
<div class="page active" id="merchantPage">
  <div class="status-bar" id="statusBar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">连接中...</span>
    <span style="margin-left:auto;font-size:11px;color:var(--text-dim)" id="updateTime"></span>
  </div>
  <div class="countdown-section" id="countdownSection">
    <div class="countdown-label" id="countdownLabel">距下次刷新</div>
    <div class="countdown-timer" id="countdownTimer">--:--:--</div>
    <div class="next-refresh" id="nextRefresh"></div>
  </div>
  <div class="round-tabs" id="roundTabs"></div>
  <div class="items-section" id="itemsSection">
    <div class="loading"><div class="loading-spinner"></div>正在获取远行商人数据...</div>
  </div>
</div>

<!-- EGG PAGE -->
<div class="page" id="eggPage">
  <div class="egg-search-box">
    <div class="hint">输入精灵蛋的<strong>尺寸</strong>和<strong>体重</strong>，查询可能孵出的精灵<br><small style="color:var(--cyan)">💡 数据来自玩家实测验证</small></div>
    <div class="egg-input-group">
      <div class="egg-input-wrap"><label>📏 尺寸（米）</label><input type="number" id="eggSize" placeholder="0.28" step="0.01" min="0" inputmode="decimal"><span class="unit">m</span></div>
      <div class="egg-input-wrap"><label>⚖️ 体重（kg）</label><input type="number" id="eggWeight" placeholder="2.36" step="0.01" min="0" inputmode="decimal"><span class="unit">kg</span></div>
    </div>
    <button class="btn-primary" onclick="queryEgg()">🔍 查询精灵</button>
    <div style="text-align:center;margin-top:8px">
      <button class="btn-primary btn-sm" onclick="runEggTests()">🧪 用实测数据验证准确性</button>
    </div>
  </div>
  <div class="egg-test-blocks" id="eggTestBlocks"></div>
  <div class="egg-quick-select" id="eggQuickSelect"></div>
  <div class="egg-results" id="eggResults">
    <div class="egg-no-result"><div class="icon">🥚</div><div class="msg">输入精灵蛋的尺寸和体重<br>或点击"验证准确性"测试数据</div></div>
  </div>
</div>

<!-- POKEDEX PAGE -->
<div class="page" id="pokedexPage">
  <div class="pokedex-search"><input type="text" id="pokedexSearch" placeholder="🔍 搜索精灵名称或编号..." oninput="renderPokedex()"></div>
  <div class="pokedex-filters" id="pokedexFilters"></div>
  <div class="pokedex-count" id="pokedexCount"></div>
  <div class="pokedex-grid" id="pokedexGrid"></div>
  <div class="pokedex-detail-overlay" id="pokedexDetail" onclick="if(event.target===this)closePokedexDetail()">
    <div class="pokedex-detail-card" id="pokedexDetailCard"></div>
  </div>
</div>

<!-- SHINY PAGE — Season Catalog + Tracker -->
<div class="page" id="shinyPage">
  <div class="shiny-section">
    <div class="shiny-intro">
      <strong>✨ 异色追踪计算器</strong><br>
      按赛季浏览异色精灵，选择目标开始追踪记录<br>
      <small style="color:var(--cyan)">📡 数据保存在本地，卸载App也不丢失</small>
    </div>
    <div class="shiny-top-bar">
      <input type="text" id="shinySearch" placeholder="🔍 快速搜索精灵名称..." oninput="renderShinyDropdown()" onfocus="renderShinyDropdown()">
      <div class="shiny-dropdown-wrap" id="shinyDropdown"></div>
    </div>
    <!-- Season Catalog Accordion -->
    <div class="shiny-catalog" id="shinyCatalog"></div>
    <!-- Currently Tracking -->
    <div class="shiny-section-title">🎯 正在追踪</div>
    <div id="shinyPets"><div class="shiny-empty">还没有添加任何精灵<br>👆 搜索或点击下方精灵来添加</div></div>
    <div class="shiny-section-title">🏆 异色出货记录</div>
    <div id="shinyHistory" style="font-size:12px;color:var(--text-dim);line-height:1.6"></div>
    <div style="text-align:center;margin-top:16px">
      <button class="btn-sm" style="background:rgba(239,83,80,0.2)!important;color:var(--red)!important" onclick="resetAllShiny()">🗑️ 重置所有数据</button>
    </div>
  </div>
</div>

<!-- EVENTS PAGE -->
<div class="page" id="eventsPage">
  <div class="events-section" id="eventsContent"></div>
</div>

<button class="refresh-fab" id="refreshFab" title="刷新商人数据">

</button>

var currentPage = 'merchant';
function switchPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.toggle('active', t.dataset.page===page); });
  document.querySelectorAll('.page').forEach(function(p){ p.classList.toggle('active', p.id===page+'Page'); });
  var titles = { merchant:'远行商人 · 实时商品', egg:'孵蛋反查 · 精灵匹配', pokedex:'精灵图鉴 · 133只全收录', shiny:'异色追踪 · 自定义', events:'活动资讯 · 赛季动态' };
  document.getElementById('headerSubtitle').textContent = titles[page] || '';
  document.getElementById('refreshFab').style.display = page==='merchant' ? '' : 'none';
  if (page==='pokedex') renderPokedex();
  if (page==='shiny') renderShiny();
  if (page==='events') renderEvents();
}
document.querySelectorAll('.nav-tab').forEach(function(t){ t.addEventListener('click', function(){ switchPage(this.dataset.page); }); });

function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg) { var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2000); }
function getSpriteImg(name) { return SPRITE_IMG[name] || null; }
function spriteImg(name, attrs) {
  var url = getSpriteImg(name);
  var mainAttr = (attrs||'').split(',')[0] || '普通';
  var color = ATTR_COLOR[mainAttr] || '#78909c';
  if (url) {
    return '<img src="'+url+'" alt="'+esc(name)+'" onerror="var s=this.parentElement;s.innerHTML=\'<div class=sprite-placeholder style=background:'+color+'>'+esc(name.charAt(0))+'</div>\'">';
  }
  var initials = name.length > 3 ? name.substring(0,2) : name.substring(0,2);
  return '<div class="sprite-placeholder" style="background:'+color+'">'+esc(initials)+'</div>';
}

var pokedexFilter = 'all';
function getUniqueAttrs() {
  var all = []; POKEDEX.forEach(function(s){
    var parts = s.attrs.split(','); parts.forEach(function(a){ if (all.indexOf(a)===-1) all.push(a); });
  }); return all;
}
function renderPokedexFilters() {
  var attrs = getUniqueAttrs();
  var html = '<div class="filter-chip'+(pokedexFilter==='all'?' active':'')+'" onclick="pokedexFilter=\'all\';renderPokedex()">全部</div>';
  attrs.forEach(function(a){ html += '<div class="filter-chip'+(pokedexFilter===a?' active':'')+'" onclick="pokedexFilter=\''+a+'\';renderPokedex()">'+ (ATTR_EMOJI[a]||'')+' '+a+'</div>'; });
  document.getElementById('pokedexFilters').innerHTML = html;
}
function renderPokedex() {
  renderPokedexFilters();
  var search = (document.getElementById('pokedexSearch').value||'').toLowerCase();
  var filtered = POKEDEX.filter(function(s){
    if (pokedexFilter!=='all' && s.attrs.indexOf(pokedexFilter)===-1) return false;
    if (search && s.name.toLowerCase().indexOf(search)===-1 && String(s.num).indexOf(search)===-1) return false;
    return true;
  });
  document.getElementById('pokedexCount').textContent = '共 '+filtered.length+' 只精灵';
  var html = '';
  filtered.forEach(function(s){
    var priAttr = s.attrs.split(',')[0];
    var imgHtml = spriteImg(s.name, priAttr);
    html += '<div class="pokedex-card" onclick="openPokedexDetail('+s.num+')">'+
      '<div class="pk-img">'+imgHtml+'</div>'+
      '<div class="pk-num">NO.'+String(s.num).padStart(3,'0')+'</div>'+
      '<div class="pk-name">'+esc(s.name)+(s.shiny?' ✨':'')+'</div>'+
      '<div class="pk-attr">'+esc(s.attrs)+'</div></div>';
  });
  document.getElementById('pokedexGrid').innerHTML = html || '<div class="no-items" style="grid-column:1/-1">未找到匹配的精灵</div>';
}
function openPokedexDetail(num) {
  var s = POKEDEX.find(function(x){return x.num===num;});
  if (!s) return;
  var priAttr = s.attrs.split(',')[0];
  var imgHtml = spriteImg(s.name, priAttr);
  var attrTags = s.attrs.split(',').map(function(a){ return '<span style="display:inline-block;padding:2px 8px;margin:2px;border-radius:8px;font-size:11px;background:'+(ATTR_COLOR[a]||'#555')+';color:#fff">'+(ATTR_EMOJI[a]||'')+' '+a+'</span>'; }).join('');
  document.getElementById('pokedexDetailCard').innerHTML =
    '<div class="detail-img">'+imgHtml+'</div>'+
    '<div class="detail-name">'+esc(s.name)+(s.shiny?' ✨':'')+'</div>'+
    '<div class="detail-num">NO.'+String(s.num).padStart(3,'0')+(s.shiny?' · 有异色形态':'')+'</div>'+
    '<div class="detail-attr">'+attrTags+'</div>'+
    '<div class="detail-info">洛克王国世界精灵图鉴收录<br>数据来源：Bilibili WIKI</div>'+
    '<button class="detail-close" onclick="closePokedexDetail()">关闭</button>';
  document.getElementById('pokedexDetail').classList.add('show');
}
function closePokedexDetail() { document.getElementById('pokedexDetail').classList.remove('show'); }

function calcMatchScore(size, weight, s) {
  var sizeCenter = (s.sizeMin + s.sizeMax) / 2;
  var sizeHalf = (s.sizeMax - s.sizeMin) / 2 || 0.001;
  var weightCenter = (s.weightMin + s.weightMax) / 2;
  var weightHalf = (s.weightMax - s.weightMin) / 2 || 0.001;
  return (Math.max(0, 1 - Math.abs(size - sizeCenter) / sizeHalf) + Math.max(0, 1 - Math.abs(weight - weightCenter) / weightHalf)) / 2;
}

function queryEgg() {
  var size = parseFloat(document.getElementById('eggSize').value);
  var weight = parseFloat(document.getElementById('eggWeight').value);
  if (isNaN(size)||isNaN(weight)||size<=0||weight<=0) { toast('请输入有效的尺寸和体重'); return; }
  var matches = [];
  for (var i=0; i<EGG_DATA.length; i++) {
    var s = EGG_DATA[i];
    // Hard filter: BOTH size AND weight must be within range
    if (size>=s.sizeMin && size<=s.sizeMax && weight>=s.weightMin && weight<=s.weightMax) {
      matches.push({spirit:s, score:calcMatchScore(size,weight,s)});
    }
  }
  matches.sort(function(a,b){return b.score-a.score;});
  renderEggResults(matches, size, weight);
}

function findClosest(size, weight, count) {
  var cands = [];
  EGG_DATA.forEach(function(s){
    var sizeDist=0, weightDist=0, reason='';
    if (size<s.sizeMin){sizeDist=s.sizeMin-size;reason='尺寸偏小';}
    else if(size>s.sizeMax){sizeDist=size-s.sizeMax;reason='尺寸偏大';}
    if (weight<s.weightMin){weightDist=s.weightMin-weight;if(!reason)reason='体重偏轻';}
    else if(weight>s.weightMax){weightDist=weight-s.weightMax;if(!reason)reason='体重偏重';}
    if(sizeDist===0&&weightDist===0) return;
    var sizeNorm=sizeDist/(s.sizeMax-s.sizeMin||0.01);
    var weightNorm=weightDist/(s.weightMax-s.weightMin||0.01);
    cands.push({spirit:s, dist:sizeNorm+weightNorm, reason:reason});
  });
  cands.sort(function(a,b){return a.dist-b.dist;});
  return cands.slice(0,count);
}

function loadShiny() {
  try {
    // Try v5 first, then migrate from v4 if needed
    var d = localStorage.getItem('luoke_shiny_v5');
    if (d) return JSON.parse(d);
    var old = localStorage.getItem('luoke_shiny_v4');
    if (old) {
      var data = JSON.parse(old);
      // Migrate: add evos field from S1/S2_SHINY
      var allShiny = S1_SHINY.concat(S2_SHINY);
      Object.keys(data.pets||{}).forEach(function(k) {
        if (!data.pets[k].evos) {
          var found = allShiny.find(function(s){ return s.name===k; });
          data.pets[k].evos = found&&found.evos ? found.evos : [];
          data.pets[k].num = found ? found.num : 0;
        }
      });
      saveShiny(data);
      return data;
    }
  } catch(e) {}
  return { pets:{}, history:[], openSeasons:{s2:true,s1:false} };
}
function saveShiny(data) { localStorage.setItem('luoke_shiny_v5', JSON.stringify(data)); }

// --- CRUD for tracking ---
function shinyAddPet(name, num) {
  if (shinyData.pets[name] && shinyData.pets[name].count > 0) {
    toast('「'+name+'」已在追踪列表中');
    return;
  }
  // Look up evolution chain from combined S1+S2 data
  var allShiny = S1_SHINY.concat(S2_SHINY);
  var found = allShiny.find(function(s){ return s.name===name; });
  shinyData.pets[name] = {
    name: name, num: num||(found?found.num:0), count: 0, shinyCount: 0,
    evos: found&&found.evos ? found.evos : [],
    lastCatch: null, createdAt: new Date().toISOString()
  };
  saveShiny(shinyData);
  document.getElementById('shinySearch').value = '';
  document.getElementById('shinyDropdown').classList.remove('show');
  renderShiny();
  toast('✅ 已添加「'+name+'」到追踪列表');
}

function shinyRecordCatch(name, gotShiny) {
  if (!shinyData.pets[name]) return;
  var p = shinyData.pets[name];
  p.count = (p.count || 0) + 1;
  p.lastCatch = new Date().toISOString();
  if (gotShiny) {
    p.shinyCount = (p.shinyCount || 0) + 1;
    shinyData.history.push({ name: name, date: new Date().toISOString(), atCount: p.count });
    toast('🎉 恭喜！「'+name+'」第'+p.count+'次出异色！');
  }
  saveShiny(shinyData);
  renderShiny();
}

function shinyResetPet(name) {
  if (!shinyData.pets[name]) return;
  if (!confirm('确定要重置「'+name+'」的计数吗？\n出货记录会保留。')) return;
  shinyData.pets[name].count = 0;
  shinyData.pets[name].lastCatch = null;

  renderShiny();
  toast('已重置计数');
}

function shinyDeletePet(name) {
  if (!shinyData.pets[name]) return;

    html += '<div class="shiny-pet-card">'+
      '<div class="shiny-pet-header">'+
        '<div class="pet-img">'+imgHtml+'</div>'+
        '<div class="pet-info">'+
          '<div class="pet-name">✨ '+esc(p.name)+'</div>'+
          '<div class="pet-sub">最近捕捉: '+(p.lastCatch ? new Date(p.lastCatch).toLocaleDateString('zh-CN') : '尚未捕捉')+'</div>'+
        '</div>'+
        '<div class="pet-count">'+count+'</div>'+
      '</div>'+
      evoHtml+
      '<div class="shiny-pet-bar-wrap"><div class="shiny-pet-bar" style="width:'+pct+'%;background:'+barColor+'"></div></div>'+
      '<div style="font-size:11px;color:var(--text-dim);margin-bottom:8px">'+
        '距保底还差 <strong>'+(PITY_MAX-count)+'</strong> 次 ('+pct+'%) | 已出异色: '+(p.shinyCount||0)+' 只'+
      '</div>'+
      '<div class="shiny-pet-actions">'+
        '<button class="pet-btn catch-normal" onclick="shinyRecordCatch(\''+esc(p.name)+'\', false)">+1 没出</button>'+
        '<button class="pet-btn catch-shiny" onclick="shinyRecordCatch(\''+esc(p.name)+'\', true)">✨ 出异色了！</button>'+
        '<button class="pet-btn reset" onclick="shinyResetPet(\''+esc(p.name)+'\')">重置</button>'+
        '<button class="pet-btn delete" onclick="shinyDeletePet(\''+esc(p.name)+'\')">删除</button>'+
      '</div></div>';
  });
  var grandTotal = 0, grandShinies = 0;
  keys.forEach(function(k) { grandTotal += (shinyData.pets[k].count||0); grandShinies += (shinyData.pets[k].shinyCount||0); });
  html += '<div style="background:var(--bg-card);border-radius:12px;padding:14px;margin-top:12px;text-align:center">'+
    '<div style="font-size:12px;color:var(--text-dim)">🎯 总捕捉次数</div>'+
    '<div style="font-size:32px;font-weight:700;color:var(--gold)">'+grandTotal+'</div>'+
    '<div style="font-size:12px;color:var(--text-dim)">✨ 累计异色: '+grandShinies+' 只 | 出货率: '+(grandTotal>0?(grandShinies/grandTotal*100).toFixed(1):'0')+'%</div>'+
    '</div>';
  document.getElementById('shinyPets').innerHTML = html;
}

// ===========================================================
// MERCHANT LOGIC — jsDelivr CDN (GitHub Actions 每5分钟更新)
// ===========================================================
var JSDELIVR_URL = 'https://cdn.jsdelivr.net/gh/Qixinan0101/luoke-merchant@main/data/merchant.json';
var RAW_GITHUB_URL = 'https://raw.githubusercontent.com/Qixinan0101/luoke-merchant/main/data/merchant.json';
var merchantData = null, currentRound = null, countdownInterval = null;
var CATEGORY_ICONS = {'炼金材料':'⚗️','精灵喂养材料':'🍎','血脉修改道具':'💊','精灵蛋':'🥚','炫彩蛋':'🌈','技能石材料':'💎','咕噜球':'⚽','特制咕噜球':'⚽','default':'📦'};

function getBeijingNow() {
  var now = new Date();
  var offset = now.getTimezoneOffset() + 480;
  return new Date(now.getTime() + offset * 60000);
}
function isMerchantActive() {
  var h = getBeijingNow().getHours();
  return h >= 8 && h < 24;
}
function getActiveRound() {
  var h = getBeijingNow().getHours();
  if (h>=8&&h<12) return 1; if (h>=12&&h<16) return 2;
  if (h>=16&&h<20) return 3; if (h>=20&&h<24) return 4;
  return null;
}
function getNextRoundStart() {
  var bj = getBeijingNow();
  var h = bj.getHours();
  var nextHours = [8,12,16,20,32];
  for (var i=0; i<nextHours.length; i++) {
    if (h < nextHours[i]) {
      var target = new Date(bj);
      target.setHours(nextHours[i], 0, 0, 0);
      return {target:target, roundName:i<4?'第'+(i+1)+'轮':'营业开始'};
    }
  }
  var target = new Date(bj); target.setDate(target.getDate()+1); target.setHours(8,0,0,0);
  return {target:target, roundName:'营业开始'};
}

function fetchWithTimeout(url, timeoutMs) {
  var ctrl = new AbortController();
  var timer = setTimeout(function(){ctrl.abort();}, timeoutMs);
  return fetch(url, {signal:ctrl.signal}).finally(function(){clearTimeout(timer);});
}

async function fetchData() {
  var fab = document.getElementById('refreshFab');
  fab.classList.add('spinning');
  var errors = [];

  // Try 1: jsDelivr CDN (缓存，由 GitHub Actions 维护，稳定高速)
  try {
    var res = await fetchWithTimeout(JSDELIVR_URL + '?_=' + Date.now(), 8000);
    if (res.ok) {
      var json = await res.json();
      if (json && json.rounds) {
        merchantData = { data: json, source: 'jsdelivr' };
        render();
        fab.classList.remove('spinning');
        return;
      }
    }
    errors.push('CDN: ' + (res.ok ? 'no data' : 'HTTP ' + res.status));
  } catch(e) { errors.push('CDN: ' + (e.name === 'AbortError' ? 'timeout' : e.message)); }

  // Try 2: Raw GitHub (直连，兜底)
  try {
    var res2 = await fetchWithTimeout(RAW_GITHUB_URL + '?_=' + Date.now(), 6000);
    if (res2.ok) {
      var json2 = await res2.json();
      if (json2 && json2.rounds) {
        merchantData = { data: json2, source: 'raw' };
        render();
        fab.classList.remove('spinning');
        return;
      }
    }
    errors.push('GitHub: ' + (res2.ok ? 'no data' : 'HTTP ' + res2.status));
  } catch(e) { errors.push('GitHub: ' + (e.name === 'AbortError' ? 'timeout' : e.message)); }

  showError('数据加载失败<br><small>' + errors.join(' | ') + '</small>');
  fab.classList.remove('spinning');
}

function showError(msg) {
  document.getElementById('itemsSection').innerHTML = '<div class="no-items">⚠️ '+msg+'</div>';
  document.getElementById('statusText').textContent = '数据获取失败';
  document.getElementById('statusDot').classList.add('closed');
}

function render() {
  if (!merchantData || !merchantData.data) return;
  var d = merchantData.data;
  var source = merchantData.source || 'unknown';
  var active = isMerchantActive();
  var ar = getActiveRound();
  var sd = document.getElementById('statusDot');
  sd.classList.remove('closed');
  if (!active) {
    document.getElementById('statusText').textContent = '商人休息中（00:00-08:00）';
    sd.classList.add('closed');
  } else if (ar) {
    var rn = {1:'08:00-12:00',2:'12:00-16:00',3:'16:00-20:00',4:'20:00-24:00'};
    document.getElementById('statusText').textContent = '营业中 · 第'+ar+'轮（'+rn[ar]+'）';
  }
  // Show data source and update time
  var sourceLabel = source === 'jsdelivr' ? '📦 CDN' : (source === 'raw' ? '🔗 GitHub' : '');
  if (d.fetchedAt) {
    var ft = new Date(d.fetchedAt);
    document.getElementById('updateTime').textContent = '更新于 '+
      String(ft.getMonth()+1).padStart(2,'0')+'/'+String(ft.getDate()).padStart(2,'0')+' '+
      String(ft.getHours()).padStart(2,'0')+':'+String(ft.getMinutes()).padStart(2,'0')+' ' + sourceLabel;
  } else {
    document.getElementById('updateTime').textContent = '刚刚更新 ' + sourceLabel;
  }
  renderCountdown(active, ar);
  renderRoundTabsFromAPI(d, ar);
  renderItemsFromAPI(d, active, ar);
}

function renderCountdown(active, ar) {
  var timerEl = document.getElementById('countdownTimer');
  var labelEl = document.getElementById('countdownLabel');
  var nextEl = document.getElementById('nextRefresh');
  stopCountdown();
  if (!active) {
    var bj = getBeijingNow();
    var next8 = new Date(bj); next8.setHours(8,0,0,0);
    if (bj.getHours()>=8) next8.setDate(next8.getDate()+1);
    timerEl.classList.add('closed');
    labelEl.textContent = '距下次营业';
    nextEl.textContent = '明天 08:00 开始';
    countdownInterval = setInterval(function(){
      var diff = next8 - getBeijingNow();
      if (diff<=0) { timerEl.textContent='商人已出现！'; timerEl.classList.remove('closed'); clearInterval(countdownInterval); fetchData(); return; }
      var h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
      timerEl.textContent = String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    },1000);
    return;
  }
  var next = getNextRoundStart();
  timerEl.classList.remove('closed');
  labelEl.textContent = '距'+next.roundName+'结束';
  countdownInterval = setInterval(function(){
    var diff = next.target - getBeijingNow();
    if (diff<=0) { timerEl.textContent='刷新中...'; clearInterval(countdownInterval); fetchData(); return; }
    var h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
    timerEl.textContent = String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    nextEl.textContent = '下一轮刷新：'+String(next.target.getHours()).padStart(2,'0')+':00';
  },1000);
}

function stopCountdown() { if (countdownInterval) { clearInterval(countdownInterval); countdownInterval=null; } }

function renderRoundTabsFromAPI(d, ar) {
  var c = document.getElementById('roundTabs');
  var apiRound = d.round || ar || 1;
  if (currentRound === null) currentRound = apiRound;
  var rn = {1:'第1轮 08:00',2:'第2轮 12:00',3:'第3轮 16:00',4:'第4轮 20:00'};
  var rt = {1:'08:00-12:00',2:'12:00-16:00',3:'16:00-20:00',4:'20:00-24:00'};
  var html = '';
  for (var r=1; r<=4; r++) {
    var itemCount = (d.rounds && d.rounds[String(r)]) ? d.rounds[String(r)].length : 0;
    var countText = itemCount > 0 ? itemCount+'件' : '';
    html += '<div class="round-tab'+(r===currentRound?' active':'')+'" data-round="'+r+'" onclick="switchRound('+r+')">'+
      '<div>'+rn[r]+'</div><div class="tab-time">'+countText+(r===apiRound?' • 当前轮':'')+'</div></div>';
  }
  c.innerHTML = html;
}

function switchRound(r) {
  currentRound = parseInt(r);
  document.querySelectorAll('.round-tab').forEach(function(tab){ tab.classList.toggle('active', parseInt(tab.dataset.round)===currentRound); });
  if (merchantData && merchantData.data) renderItemsFromAPI(merchantData.data, isMerchantActive(), currentRound);
}

function renderItemsFromAPI(d, active, ar) {
  var c = document.getElementById('itemsSection');
  if (!active) {
    c.innerHTML = '<div class="closed-overlay"><div class="closed-icon">🌙</div><div class="closed-text">远行商人休息中<br>每日 08:00-24:00 营业<br>一天4轮：08:00/12:00/16:00/20:00</div></div>';
    return;
  }
  // 按选中轮次取商品，无指定则取当前轮
  var items = (ar && d.rounds && d.rounds[String(ar)]) ? d.rounds[String(ar)] : (d.items || []);
  if (!items || items.length === 0) {
    var roundLabel = ar ? '第'+ar+'轮' : '当前轮';
    c.innerHTML = '<div class="no-items">⏳ '+roundLabel+'商品数据尚未更新<br><small>正在从 onebiji.com 获取...</small></div>';
    return;
  }
  var rLabel = '';
  if (ar) { var rn = {1:'08:00',2:'12:00',3:'16:00',4:'20:00'}; rLabel = '第'+ar+'轮 · '+rn[ar]+' 刷新'; }
  var sourceLabel = merchantData && merchantData.source === 'onebiji' ? '⚡ 实时抓取' : '📦 缓存数据';
  var html = '<div class="round-title">'+rLabel+'<span class="time">'+ (d.subtitle||'') +'</span>'+
    '<span class="meta-api-src">'+sourceLabel+'</span></div>';
  items.forEach(function(item){
    var icon = CATEGORY_ICONS[item.category]||CATEGORY_ICONS['default'];
    var price = item.price || item.priceRaw || '?';
    var imgHtml = item.image
      ? '<div class="item-img"><img src="'+item.image+'" alt="'+esc(item.name)+'" onerror="this.parentElement.innerHTML=\''+icon+'\'"></div>'
      : '<div class="item-img">'+icon+'</div>';
    html += '<div class="item-card">'+imgHtml+
      '<div class="item-info"><div class="item-name">'+esc(item.name)+'</div>'+
        '<div class="item-category">'+esc(item.category||'')+'</div>'+
        '<div class="item-meta"><span class="meta-price">💰 '+esc(String(price))+'</span><span class="meta-limit">📦 限购 '+esc(String(item.limit||'?'))+'</span></div>'+
      '</div></div>';
  });
  c.innerHTML = html;
}
