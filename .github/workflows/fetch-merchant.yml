name: 抓取远行商人数据

on:
  schedule:
    # 每10分钟运行一次，北京时间 08:00-24:00 (UTC 00:00-16:00)
    - cron: '*/10 0-16 * * *'
  workflow_dispatch:  # 支持手动触发

concurrency:
  group: merchant-fetch
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: 抓取远行商人数据
        run: python fetch_merchant.py
        continue-on-error: true

      - name: 提交数据更新
        if: success() || failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 只提交 data/merchant.json 的变更
          git add data/merchant.json

          if git diff --staged --quiet; then
            echo "数据无变化，跳过提交"
          else
            NOW=$(TZ='Asia/Shanghai' date '+%m-%d %H:%M')
            git commit -m "🛒 远行商人数据 [$NOW CST]"
            git push
            echo "数据已更新并推送"
          fi
